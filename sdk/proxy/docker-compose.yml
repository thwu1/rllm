version: '3.8'

services:
  rllm-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rllm-proxy
    ports:
      - "8000:8000"
    environment:
      # Provider API Keys - set these in .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}

      # Proxy configuration
      - RLLM_PROXY_CONFIG=/app/config.yaml
      - RLLM_LOG_DIR=/app/logs
      - RLLM_ENABLE_LOGPROBS=true
      - RLLM_ENABLE_PROMPT_TOKENS=true

    volumes:
      # Mount config file
      - ./config.yaml:/app/config.yaml:ro

      # Mount logs directory for persistence
      - ./logs:/app/logs

      # Optional: Mount custom middleware
      - ./middleware.py:/app/sdk/proxy/middleware.py:ro

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Optional: Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: rllm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  redis-data:
